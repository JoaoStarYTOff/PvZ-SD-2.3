<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="744.96484" height="304.40002" viewBox="0,0,744.96484,304.40002"><g transform="translate(-17.15501,-17.96904)"><g fill="#000000" stroke="none" stroke-miterlimit="10" font-family="Sans Serif" font-size="40"><text transform="translate(17.40501,39.21904) scale(0.5,0.5)" font-size="40" xml:space="preserve" fill="#000000"><tspan x="0" dy="0">First melee plant </tspan><tspan x="0" dy="46.150000000000006px"> </tspan><tspan x="0" dy="46.150000000000006px">First attacking plant with knockback</tspan><tspan x="0" dy="46.150000000000006px"> </tspan><tspan x="0" dy="46.150000000000006px">First plant that changes it attack after X hits (her knockback on the 5th strike).</tspan><tspan x="0" dy="46.150000000000006px"> </tspan><tspan x="0" dy="46.150000000000006px">First plant with more than 4 sprites that are all used</tspan><tspan x="0" dy="46.150000000000006px"> </tspan><tspan x="0" dy="46.150000000000006px">First plant with randomized attack frames</tspan><tspan x="0" dy="46.150000000000006px"> </tspan><tspan x="0" dy="46.150000000000006px">First plant with 3 different attack sprites (Left paw, right paw, roar)</tspan><tspan x="0" dy="46.150000000000006px"> </tspan><tspan x="0" dy="46.150000000000006px">I love her</tspan></text></g></g></svg>